<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestione Prodotti</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#9b9cc2">

<!-- iOS support -->
<link rel="apple-touch-icon" href="icons/icon-192.png">

<style>
body {
    background-color: #9b9cc2;
    font-family: Arial;
    padding: 20px;
}
table { width:100%; border-collapse: collapse;}
th, td { border:1px solid black; padding:6px;}
th { background:#eee; cursor:pointer;}
td { background:#ebebeb;}
</style>
</head>

<body>

<h1>Gestione Prodotti</h1>

<input id="productName" placeholder="Prodotto">
<input id="productPrice" type="number" placeholder="Prezzo">
<select id="storeName"></select>
<button onclick="addProduct()">Aggiungi</button>

<br><br>

<button onclick="saveToCloud()">☁️ Salva Cloud</button>
<button onclick="loadFromCloud()">⬇️ Carica Cloud</button>

<table id="productTable">
<thead>
<tr>
<th>Prodotto</th>
<th>Prezzo</th>
<th>Store</th>
<th>Azioni</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script src="api.js"></script>
<script src="app.js"></script>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
