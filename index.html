<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestione Prodotti</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#9b9cc2">

<style>
body {
    background:#9b9cc2;
    font-family: Arial;
    padding:20px;
}

table {
    width:100%;
    border-collapse: collapse;
}

th, td {
    border:1px solid #000;
    padding:6px;
    text-align:left;
}

th {
    background:#eee;
    cursor:pointer;
}

td { background:#ebebeb; }

input, select, button {
    margin:5px;
    padding:6px;
}
</style>
</head>

<body>

<h1>Gestione Prodotti</h1>

<input id="productName" placeholder="Prodotto">
<input id="productPrice" type="number" placeholder="Prezzo">

<select id="storeName"></select>

<button onclick="addProduct()">Aggiungi</button>

<br><br>

<button onclick="saveToCloud()">☁️ Salva Cloud</button>
<button onclick="loadFromCloud()">⬇️ Carica Cloud</button>

<br><br>

<input id="searchProduct" placeholder="Cerca...">

<table>
<thead>
<tr>
<th>Prodotto</th>
<th>Ultimo</th>
<th>Store</th>
<th>Media</th>
<th>Max</th>
<th>Min</th>
<th>Azioni</th>
<th>Qtà</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<script src="api.js"></script>
<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
